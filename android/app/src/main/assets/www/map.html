<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>OSRM GPS 路徑規劃</title>
  <link rel="stylesheet" href="leaflet/leaflet.css"/>
  <style>
    html,body,#map { height:100%; margin:0; padding:0; }
    #toolbar { position:absolute; top:10px; left:10px; z-index:1000; background:#fff; padding:8px; border-radius:4px; box-shadow:0 2px 6px rgba(0,0,0,0.3); }
    button { margin:2px; }
  </style>
</head>
<body>
<div id="map"></div>
<div id="toolbar">
  <button id="locBtn">定位</button>
  <button id="clearBtn">清除點位</button>
  <button id="routeBtn">規劃路徑</button>
</div>
<script src="leaflet/leaflet.js"></script>
<script src="map.js"></script>
</body>
</html>
